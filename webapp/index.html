<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Epic Gift Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

    <!-- HEADER -->
    <div class="header">
        <div>
            <h2>Epic Gift</h2>
            <div class="balance">💎 <span id="balance">0</span></div>
        </div>
        <button class="btn">Пополнить</button>
    </div>

    <!-- LIVE -->
    <div class="live">
        <span class="dot"></span> Live
    </div>

    <!-- GAME CARDS -->
    <div class="card big blue" onclick="playGame()">
        🚀 РАКЕТКА
    </div>

    <div class="card orange">
        ⚔️ PVP
    </div>

    <div class="row">
        <div class="card purple">📦 Контракты</div>
        <div class="card green">⬆️ Улучшение</div>
    </div>

</div>

<!-- NAVBAR -->
<div class="navbar">
    <div>📦<br>Инвентарь</div>
    <div>👥<br>Пригласить</div>
    <div class="active">🏠<br>Главная</div>
    <div>🏆<br>Рейтинг</div>
    <div>🎁<br>Награды</div>
</div>

<script src="script.js"></script>
</body>
</html>
